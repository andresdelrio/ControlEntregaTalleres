<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Acceso institucional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <main class="access-page">
    <section class="access-login" aria-labelledby="tituloAcceso">
      <p class="page-kicker">Uso institucional</p>
      <h1 id="tituloAcceso">Acceso al seguimiento</h1>
      <p class="page-intro">Ingrese el código asignado para consultar registros, generar reportes, registrar entregas o cargar información.</p>

      <form id="formAcceso" class="mt-4">
        <label for="codigoAcceso" class="form-label">Código de acceso</label>
        <input id="codigoAcceso" type="password" class="form-control" minlength="6" autocomplete="current-password" required autofocus>
        <div id="errorAcceso" class="alert alert-danger d-none mt-3" role="alert"></div>
        <button id="iniciarSesion" class="btn btn-primary w-100 mt-3" type="submit">Ingresar</button>
      </form>

      <p class="access-login__note">La sesión se cerrará automáticamente después de ocho horas o al usar “Cerrar sesión”.</p>
      <a class="access-login__back" href="consultaPadres.html">Volver a la consulta para familias</a>
    </section>
  </main>

  <script src="js/acceso.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-R62Z0D2MEC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-R62Z0D2MEC');
  </script>
</body>
</html>
